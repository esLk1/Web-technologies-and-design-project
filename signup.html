<!DOCTYPE html>
<html lang="sk">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> STARSHIP| CREW</title>
        <link rel="stylesheet" href="css/style.css"/>
    </head>
    <body>
    <header>
        <h1>BECOME CREW MEMBER</h1>
    </header>
    <nav>
        <a href="index.html">HOME</a>
        <a href="spec.html">ABOUT</a>
        <a href="signup.html">SIGNUP</a>
        <a href="starbase.html">STARBASE</a>
        <a href="galery.html">GALLERY</a>
        <a href="missions.html">MISSIONS</a>
    </nav>
    <div class="container">
        <main>
            <h2 class="signup-header">SIGN UP</h2>
            <form id="signup" novalidate>
                <div class="form-group">
                    <label for="name">FIRST NAME & SURNAME</label>
                    <input type="text" id="name" name="name" required>
                    <span class="error" id="erorName"></span>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <span class="error" id="erorEmail"></span>
                </div>
                <div class="form-group">
                    <label for="rola">Role</label>
                    <select id="rola" name="rola" required>
                        <option value="">Select your desired role</option>
                        <option value="engineer">Engineer</option>
                        <option value="pilot">Pilot</option>
                        <option value="commander">Commander</option>
                    </select>
                    <span class="error" id="errorRole"></span>
                </div>
                <div >
                    <label>CHoose your prefered mission</label>
                    <div class="radio-group">
                        <input type="radio" id="mission1" name="mission" value="MOON" required>
                        <label for="mission1">MOON</label>
                        <input type="radio" id="mission2" name="mission" value="MARS" required>
                        <label for="mission2">MARS</label>
                        <span class="error" id="errorMission"></span>
                    </div>
                </div>
                <div class="form-group">
                    <label for="message">Why should we choose you</label>
                    <textarea id="message" name="message"></textarea>
                </div>
                <div class="form-group">
                    <label for="accept">Terms</label>
                    <input type="checkbox" id="accept" required>
                    <span>I accept that flying is dangerous.</span>
                    <span class="error" id="errorTerms"></span>
                </div>
                <button type="submit">LETS FLY</button>
            </form>
        </main>
    </div>
    <footer>
        &copy; 2026 Zdenko Slusny Vsetky prava vyhradene.
    </footer>
    <script src="js/app.js"></script>
    </body>
</html>
